<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICF Evaluator V3</title>
<style>
body { font-family: -apple-system; background:#f5f5f7; margin:0; }
.container { max-width:700px; margin:auto; padding:20px; }
.card { background:white; padding:25px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
h2 { margin-bottom:20px; }
.rating button { margin:5px; padding:10px 14px; border-radius:10px; border:1px solid #ddd; background:white; cursor:pointer; }
.rating button.active { background:black; color:white; }
.progress { margin-bottom:15px; font-size:14px; color:#666; }
button.next { margin-top:20px; padding:12px; width:100%; border:none; border-radius:12px; background:black; color:white; }
</style>
</head>
<body>
<div class="container">
<div class="card">
<div id="progress"></div>
<h2 id="question"></h2>
<div class="rating" id="rating"></div>
<button class="next" onclick="nextQuestion()">Next</button>
</div>
<h2 id="result"></h2>
</div>

<script>
const questions = [
"Maintains confidentiality",
"Distinguishes coaching vs advice",
"Maintains curiosity",
"Client sets session goal",
"Creates trust",
"Listens actively",
"Evokes awareness",
"Facilitates growth"
];

let current = 0;
let answers = [];

function loadQuestion() {
 document.getElementById("progress").innerText = `Question ${current+1} of ${questions.length}`;
 document.getElementById("question").innerText = questions[current];

 const ratingDiv = document.getElementById("rating");
 ratingDiv.innerHTML = "";

 for(let i=1;i<=5;i++){
   const btn = document.createElement("button");
   btn.innerText = i;
   btn.onclick = ()=> selectRating(i, btn);
   ratingDiv.appendChild(btn);
 }
}

function selectRating(value, btn){
 answers[current] = value;
 document.querySelectorAll(".rating button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

function nextQuestion(){
 if(answers[current]==null){ alert("Please select a rating"); return; }
 current++;
 if(current < questions.length){
   loadQuestion();
 } else {
   showResult();
 }
}

function showResult(){
 let total = answers.reduce((a,b)=>a+b,0);
 let avg = (total/answers.length).toFixed(2);
 document.querySelector(".card").style.display="none";
 document.getElementById("result").innerText = `Score: ${avg}`;
}

loadQuestion();
</script>
</body>
</html>
